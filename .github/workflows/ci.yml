name: FlexGate Labs — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_chaos:
        description: 'Run chaos tests'
        required: false
        default: 'false'
      run_load:
        description: 'Run k6 load tests'
        required: false
        default: 'false'

env:
  GATEWAY_URL: http://localhost:3000
  DEMO_EMAIL: admin@flexgate.dev
  DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
  PROMETHEUS_URL: http://localhost:9090

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Infrastructure ───────────────────────────────────────────────────────
  infra:
    name: Start Infrastructure
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      ready: ${{ steps.readiness.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman podman-compose

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start services
        run: podman-compose -f podman-compose.yml up -d --build

      - name: Wait for services to be ready
        id: readiness
        run: |
          bash scripts/wait-for-ready.sh
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Upload service logs on failure
        if: failure()
        run: podman-compose -f podman-compose.yml logs > service-startup.log 2>&1 || true

      - name: Upload startup logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: startup-logs
          path: service-startup.log

  # ─── E2E Tests ────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run E2E tests
        run: npx jest --testPathPattern="tests/e2e" --runInBand --forceExit --json --outputFile=reports/e2e-results.json
        continue-on-error: true
      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: reports/e2e-results.json

  # ─── Admin API Tests ──────────────────────────────────────────────────────
  test-admin:
    name: Admin API Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run Admin API tests
        run: npx jest --testPathPattern="tests/admin" --runInBand --forceExit --json --outputFile=reports/admin-results.json
        continue-on-error: true
      - name: Upload Admin results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-results
          path: reports/admin-results.json

  # ─── Security Tests ───────────────────────────────────────────────────────
  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run security tests
        run: npx jest --testPathPattern="tests/security" --runInBand --forceExit --json --outputFile=reports/security-results.json
        continue-on-error: true
      - name: Upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: reports/security-results.json

  # ─── Reliability Tests (Rate Limit + Circuit Breaker + Retry + Timeout) ──
  test-reliability:
    name: Reliability Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run rate limit tests
        run: npx jest --testPathPattern="tests/rate-limit" --runInBand --forceExit --json --outputFile=reports/rate-limit-results.json
        continue-on-error: true
      - name: Run circuit breaker tests
        run: npx jest --testPathPattern="tests/circuit-breaker" --runInBand --forceExit --json --outputFile=reports/circuit-breaker-results.json
        continue-on-error: true
      - name: Run retry and timeout tests
        run: npx jest --testPathPattern="tests/(retry|timeout)" --runInBand --forceExit --json --outputFile=reports/retry-timeout-results.json
        continue-on-error: true
      - name: Upload reliability results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reliability-results
          path: reports/*-results.json

  # ─── Observability Tests ──────────────────────────────────────────────────
  test-observability:
    name: Observability Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run observability tests
        run: npx jest --testPathPattern="tests/observability" --runInBand --forceExit --json --outputFile=reports/observability-results.json
        continue-on-error: true
      - name: Upload observability results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-results
          path: reports/observability-results.json

  # ─── Chaos Tests (optional) ───────────────────────────────────────────────
  test-chaos:
    name: Chaos Tests
    runs-on: ubuntu-latest
    needs: [test-e2e, test-security, test-reliability]
    if: github.event.inputs.run_chaos == 'true' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run chaos tests
        run: npx jest --testPathPattern="tests/chaos" --runInBand --forceExit --json --outputFile=reports/chaos-results.json
        continue-on-error: true
      - name: Upload chaos results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-results
          path: reports/chaos-results.json

  # ─── Load Tests (optional) ────────────────────────────────────────────────
  test-load:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    needs: [test-e2e, test-security, test-reliability]
    if: github.event.inputs.run_load == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -qq
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start services
        run: |
          sudo apt-get install -y podman podman-compose -qq
          podman-compose -f podman-compose.yml up -d --build
          bash scripts/wait-for-ready.sh
      - name: Run k6 baseline load test
        run: k6 run --summary-export=reports/k6-baseline.json load/baseline.js
        continue-on-error: true
      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-results
          path: reports/k6-baseline.json

  # ─── Final Report ─────────────────────────────────────────────────────────
  report:
    name: Generate Final Report
    runs-on: ubuntu-latest
    needs: [test-e2e, test-security, test-reliability, test-observability]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true

      - name: Generate consolidated report
        run: npx ts-node scripts/generate-report.ts
        continue-on-error: true

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: full-test-report
          path: |
            reports/full-report.json
            reports/*.json

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/full-report.json';
            if (!fs.existsSync(reportPath)) {
              console.log('No report found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
            const icon = report.overallPassed ? '✅' : '❌';
            const lines = report.suites.map(s => {
              const si = s.status === 'PASS' ? '✅' : s.status === 'FAIL' ? '❌' : '⏭';
              return `| ${si} | ${s.name} | ${s.passed} | ${s.failed} | ${s.pending} |`;
            });
            const body = `## ${icon} FlexGate Labs Test Results\n\n` +
              `| | Suite | Passed | Failed | Pending |\n` +
              `|---|---|---|---|---|\n` +
              lines.join('\n') + '\n\n' +
              `**Total:** ${report.summary.totalPass} passed, ${report.summary.totalFail} failed\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
